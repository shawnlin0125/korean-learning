apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "korean-learning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.userService.replicas }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        {{- include "korean-learning.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: user-service
          image: {{ .Values.userService.image }}
          imagePullPolicy: {{ .Values.userService.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.userService.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: postgres-secret
          resources:
            {{- toYaml .Values.userService.resources | nindent 12 }}
