apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service
  namespace: {{ .Values.namespace }}
  labels:
    app: quiz-service
    {{- include "korean-learning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.quizService.replicas }}
  selector:
    matchLabels:
      app: quiz-service
  template:
    metadata:
      labels:
        app: quiz-service
        {{- include "korean-learning.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: quiz-service
          image: {{ .Values.quizService.image }}
          imagePullPolicy: {{ .Values.quizService.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.quizService.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.quizService.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.quizService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.quizService.resources | nindent 12 }}
