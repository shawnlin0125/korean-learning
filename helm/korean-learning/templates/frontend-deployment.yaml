apiVersion: apps/v1
kind: Deployment
metadata:
  name: korean-learning
  namespace: {{ .Values.namespace }}
  labels:
    app: korean-learning
    {{- include "korean-learning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: korean-learning
  template:
    metadata:
      labels:
        app: korean-learning
        {{- include "korean-learning.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: korean-learning
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
