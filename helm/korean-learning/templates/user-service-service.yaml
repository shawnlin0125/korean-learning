apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "korean-learning.labels" . | nindent 4 }}
spec:
  selector:
    app: user-service
  ports:
    - port: {{ .Values.userService.port }}
      targetPort: {{ .Values.userService.port }}
