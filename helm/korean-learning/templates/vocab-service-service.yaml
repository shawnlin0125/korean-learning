apiVersion: v1
kind: Service
metadata:
  name: vocab-service
  namespace: {{ .Values.namespace }}
  labels:
    app: vocab-service
    {{- include "korean-learning.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: vocab-service
  ports:
    - port: {{ .Values.vocabService.port }}
      targetPort: {{ .Values.vocabService.port }}
      protocol: TCP
