apiVersion: apps/v1
kind: Deployment
metadata:
  name: korean-learning
  namespace: korean-learning
  labels:
    app: korean-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: korean-learning
  template:
    metadata:
      labels:
        app: korean-learning
    spec:
      containers:
        - name: korean-learning
          image: korean-learning:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
